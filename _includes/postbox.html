<!-- begin post -->
{% assign author = site.authors[post.author] %}
<div class="card h-100 shadow-sm post-card">
    <div class="card-img-container">
        <a href="{{ post.url | absolute_url }}">
            {% if post.image %} 
                <img class="card-img-top" src="{{ site.baseurl }}/{{ post.image }}" alt="{{ post.title }}"> 
            {% else %}
                <div class="card-img-placeholder"></div>
            {% endif %}
        </a>
    </div>
    <div class="card-body d-flex flex-column">
        <h2 class="card-title h4 serif-font"><a href="{{ post.url | absolute_url }}">{{ post.title }}</a></h2>
        <p class="card-text text-muted flex-grow-1">{{ post.excerpt | strip_html | truncatewords:15 }}</p>
        <div class="metafooter mt-auto pt-3 border-top border-dark">
            <div class="wrapfooter small d-flex align-items-center justify-content-between">
                <span class="author-meta d-flex align-items-center">
                    <img class="author-thumb mr-2" src="{{site.baseurl}}/{{author.avatar}}" alt="{{ author.display_name }}">
                    <span>
                        <span class="post-name font-weight-bold">{% if post.author %}{{ author.display_name }}{% else %}{{ site.author }}{% endif %}</span>
                        <br>
                        <span class="post-date text-muted">{{ post.date | date: "%b %d, %Y" }}</span>
                    </span>
                </span>
            </div>
        </div>
    </div>
</div>
<!-- end post -->
